    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bugün Maç Var mı? | Futbol ve Basketbol Maç Programı" />
    <meta
      name="twitter:description"
      content="Günün futbol ve basketbol maçlarını saat ve yayın kanalıyla görün. Yerel saat desteği."
    />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        background: #f9f9f9;
        color: #0f172a;
      }

      body.dark {
        background: #020617;
        color: #e2e8f0;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 16px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      button,
      .btn {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      .btn {
        border: 1px solid rgba(148, 163, 184, 0.8);
        background: rgba(255, 255, 255, 0.9);
        color: inherit;
        padding: 8px 10px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
      }

      body.dark .btn {
        border-color: rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.7);
      }

      .hdr {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(249, 249, 249, 0.85);
        backdrop-filter: blur(8px);
      }

      body.dark .hdr {
        border-bottom-color: rgba(51, 65, 85, 0.55);
        background: rgba(2, 6, 23, 0.55);
      }

      .seg {
        display: inline-flex;
        border: 1px solid rgba(148, 163, 184, 0.7);
        border-radius: 999px;
        padding: 3px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      body.dark .seg {
        border-color: rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.6);
      }

      .seg button {
        border: 0;
        background: transparent;
        padding: 8px 12px;
        font-weight: 800;
        font-size: 12px;
        color: inherit;
        cursor: pointer;
        border-radius: 999px;
        opacity: 0.88;
        transition: background 160ms ease, color 160ms ease, opacity 160ms ease, transform 160ms ease;
      }

      .seg button.active {
        background: #4f46e5;
        color: #fff;
        opacity: 1;
        box-shadow: 0 8px 18px rgba(79, 70, 229, 0.25);
      }

      body.dark .seg button.active {
        box-shadow: 0 10px 22px rgba(79, 70, 229, 0.25);
      }

      .sub {
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
        margin-top: 4px;
      }

      body.dark .sub {
        color: rgba(148, 163, 184, 1);
      }

      .card {
        margin-top: 12px;
        border-radius: 1rem;
        border: 1px solid rgb(226 232 240);
        background-color: rgb(255 255 255);
        overflow: hidden;
        box-shadow:
          0 4px 4px 0 #d3d3d30f,
          0 1px 1px 0 #0e0e0e0e;
      }

      body.dark .card {
        border-color: rgba(51, 65, 85, 0.6);
        background: rgba(15, 23, 42, 0.6);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 14px;
      }

      .tableWrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .tableWrap table {
        min-width: 640px;
      }

      thead {
        background: rgba(241, 245, 249, 0.9);
        color: rgba(15, 23, 42, 0.9);
      }

      body.dark thead {
        background: rgba(2, 6, 23, 0.35);
        color: rgba(226, 232, 240, 0.9);
      }

      th,
      td {
        padding: 10px 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        vertical-align: top;
      }

      body.dark th,
      body.dark td {
        border-top-color: rgba(51, 65, 85, 0.55);
      }

      tbody tr:nth-child(odd) td {
        background: rgba(241, 245, 249, 0.35);
      }

      body.dark tbody tr:nth-child(odd) td {
        background: rgba(2, 6, 23, 0.2);
      }

      .tableWrap th:nth-child(1),
      .tableWrap td:nth-child(1) {
        padding-left: 18px;
      }

      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
      }

      body.dark .meta {
        color: rgba(148, 163, 184, 1);
      }

      .hidden {
        display: none;
      }

      footer {
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        margin-top: 16px;
        padding-top: 12px;
      }

      body.dark footer {
        border-top-color: rgba(51, 65, 85, 0.55);
      }

      .fnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 12px;
        font-weight: 800;
      }

      .fnav a {
        color: inherit;
        text-decoration: none;
        opacity: 0.85;
      }

      .fnav a:hover {
        opacity: 1;
      }

      .muted {
        opacity: 0.8;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 12px;
        }

        .top {
          align-items: stretch;
        }

        .seg {
          width: 100%;
        }

        .seg button {
          flex: 1 1 0;
          text-align: center;
        }

        .btn {
          width: 100%;
          text-align: center;
        }

        /* Tek satır: takım | saat | kanal — yatay kaydırma yok */
        .tableWrap {
          overflow-x: visible;
        }

        .tableWrap table {
          min-width: 0;
          width: 100%;
          table-layout: fixed;
          font-size: 12px;
          line-height: 1.25;
        }

        .tableWrap th,
        .tableWrap td {
          padding: 6px 3px;
          vertical-align: middle;
        }

        .tableWrap th:nth-child(1),
        .tableWrap td:nth-child(1) {
          width: 42%;
          padding-left: 12px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .tableWrap th:nth-child(2),
        .tableWrap td:nth-child(2) {
          width: 18%;
          white-space: nowrap;
        }

        .tableWrap th:nth-child(3),
        .tableWrap td:nth-child(3) {
          width: 40%;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "description": "Günün futbol ve basketbol maç programı; saat ve kanal bilgisi, yerel saat desteği.",
        "publisher": {
          "@type": "Organization",
          "name": "bugunmacvarmi.com",
          "url": "https://bugunmacvarmi.com/"
        }
      }
    </script>
  </head>
  <body>
    <header class="hdr">
      <div class="wrap">
        <div class="top">
          <div>
            <h1>Bugün Maç Var mı?</h1>
            <div id="tzHeader" class="sub"></div>
          </div>
          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end">
            <div class="seg" role="tablist" aria-label="Spor seçimi">
              <button id="sportFootball" class="active" type="button" role="tab" aria-selected="true">Futbol</button>
              <button id="sportBasketball" type="button" role="tab" aria-selected="false">Basketbol</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">

      <div class="card">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Takımlar</th>
                <th>Saat</th>
                <th>Kanal</th>
              </tr>
            </thead>
            <tbody id="currentTbody"></tbody>
          </table>
        </div>
      </div>

      <button id="togglePast" class="btn" style="margin-top: 12px" type="button">Geçmiş Maçları Göster</button>

      <div id="pastBox" class="card hidden">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Takımlar</th>
                <th>Saat</th>
                <th>Kanal</th>
              </tr>
            </thead>
            <tbody id="pastTbody"></tbody>
          </table>
        </div>
      </div>

      <p id="tzInfo" class="meta"></p>
      <p id="err" class="meta hidden"></p>
      <footer>
        <div class="fnav">
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <a href="/" aria-current="page">Maçlar</a>
            <span style="opacity:.35">•</span>
            <a href="/politikalar.html">Politikalar</a>
          </div>
          <button id="themeBtn" class="btn" type="button">Koyu Mod</button>
        </div>
        <div class="muted" style="margin-top:8px" id="lastUpdated"></div>
      </footer>
    </main>

    <script src="/js/matches.js" defer></script>
  </body>
</html>
