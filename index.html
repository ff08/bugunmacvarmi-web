<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="bugunmacvarmi.com" />
    <meta name="theme-color" content="#f9f9f9" />

    <title>Bugün Maç Var mı? | Futbol ve Basketbol Maç Programı</title>
    <meta
      name="description"
      content="Günün futbol ve basketbol maçlarını saat ve yayın kanalıyla görün. Maç saatleri bulunduğunuz ülkenin yerel saatine göre listelenir."
    />
    <link rel="canonical" href="https://bugunmacvarmi.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:url" content="https://bugunmacvarmi.com/" />
    <meta property="og:site_name" content="Bugün Maç Var mı?" />
    <meta property="og:title" content="Bugün Maç Var mı? | Futbol ve Basketbol Maç Programı" />
    <meta
      property="og:description"
      content="Günün futbol ve basketbol maçlarını saat ve yayın kanalıyla görün. Maç saatleri yerel saatinize göre listelenir."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bugün Maç Var mı? | Futbol ve Basketbol Maç Programı" />
    <meta
      name="twitter:description"
      content="Günün futbol ve basketbol maçlarını saat ve yayın kanalıyla görün. Yerel saat desteği."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        background: #f9f9f9;
        color: #0f172a;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 16px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .hdrWrap {
        padding-top: 16px;
        padding-bottom: 8px;
      }

      .hdrCover {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.12),
          0 12px 24px -4px rgba(0, 0, 0, 0.35);
      }

      .hdrCover__bg {
        position: absolute;
        inset: 0;
        background-color: #0a0a0c;
        background-image:
          radial-gradient(ellipse 85% 70% at 0% 100%, rgba(163, 230, 53, 0.35), transparent 55%),
          radial-gradient(ellipse 80% 65% at 100% 0%, rgba(163, 230, 53, 0.28), transparent 52%),
          linear-gradient(180deg, rgba(10, 10, 12, 0.2) 0%, rgba(10, 10, 12, 0.75) 100%),
          url("/images/header-cover.png");
        background-size: auto, auto, auto, cover;
        background-position:
          bottom left,
          top right,
          center,
          center;
        background-repeat: no-repeat;
      }

      .hdrCover__row {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px 20px;
        padding: 22px 22px 20px;
      }

      .hdrCover__title {
        margin: 0;
        font-size: clamp(1.2rem, 4.2vw, 1.65rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: #fff;
        text-shadow: 0 2px 24px rgba(0, 0, 0, 0.45);
      }

      .hdrCover__date {
        margin: 10px 0 0;
        font-size: 14px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
      }

      .hdrCover__tz {
        margin: 6px 0 0;
        font-size: 12px;
        font-weight: 500;
        color: rgba(226, 232, 240, 0.88);
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.35);
        max-width: 42ch;
      }

      .hdrCover__actions {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      @media (max-width: 640px) {
        .hdrCover__row {
          flex-direction: column;
          align-items: stretch;
          padding: 18px 16px 16px;
        }

        .hdrCover__actions {
          width: 100%;
        }

        .hdrCover__actions .seg {
          width: 100%;
        }

        .hdrCover__actions .seg button {
          flex: 1 1 0;
          text-align: center;
        }
      }

      button,
      .btn {
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      .btn {
        border: 1px solid rgba(163, 193, 38, 0.35);
        background: #121211;
        color: #a3c126;
        padding: 8px 10px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
      }

      .hdr {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(249, 249, 249, 0.92);
        backdrop-filter: blur(10px);
      }

      .seg {
        display: inline-flex;
        border: 1px solid rgba(148, 163, 184, 0.7);
        border-radius: 999px;
        padding: 3px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      .seg button {
        border: 0;
        background: #121211;
        padding: 8px 12px;
        font-weight: 800;
        font-size: 12px;
        color: #a3c126;
        cursor: pointer;
        border-radius: 999px;
        opacity: 1;
        transition: background 160ms ease, color 160ms ease, opacity 160ms ease, transform 160ms ease;
      }

      .seg button.active {
        background: #a3c126;
        color: #121211;
        opacity: 1;
        box-shadow: 0 8px 18px rgba(163, 193, 38, 0.32);
      }

      .seg.hdrSeg {
        border-color: rgba(163, 193, 38, 0.35);
        background: #121211;
        box-shadow: none;
      }

      .sub {
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
        margin-top: 4px;
      }

      .card {
        margin-top: 12px;
        border-radius: 1rem;
        border: 1px solid rgb(226 232 240);
        background-color: rgb(255 255 255);
        overflow: hidden;
        box-shadow:
          0 4px 4px 0 #d3d3d30f,
          0 1px 1px 0 #0e0e0e0e;
      }

      /* Masaüstü: 3 sütun — takım | saat | kanal tek satırda */
      @media (min-width: 641px) {
        .tableWrap {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          padding: 0;
        }

        .tableWrap table {
          display: table;
          width: 100%;
          min-width: 640px;
          border-collapse: collapse;
          table-layout: fixed;
          font-size: 14px;
          line-height: 1.45;
          text-align: left;
        }

        .tableWrap thead {
          position: static;
          width: auto;
          height: auto;
          margin: 0;
          padding: 0;
          overflow: visible;
          clip: auto;
          clip-path: none;
          white-space: normal;
          border: 0;
        }

        .tableWrap thead th {
          padding: 11px 14px;
          font-weight: 800;
          font-size: 11px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          color: rgba(15, 23, 42, 0.85);
          background: rgba(241, 245, 249, 0.95);
          border-bottom: 1px solid rgba(148, 163, 184, 0.35);
          vertical-align: middle;
        }

        .tableWrap thead th:nth-child(1) {
          width: 44%;
          padding-left: 18px;
        }

        .tableWrap thead th:nth-child(2) {
          width: 18%;
        }

        .tableWrap thead th:nth-child(3) {
          width: 38%;
        }

        .tableWrap tbody {
          display: table-row-group;
        }

        .tableWrap tbody tr {
          display: table-row;
          margin: 0;
          padding: 0;
          border-radius: 0;
          box-shadow: none;
          border: 0;
          background: #fff;
          border-bottom: 1px solid rgba(15, 23, 42, 0.07);
        }

        .tableWrap tbody tr:nth-child(2n) {
          background: #f9f9f9;
        }

        .tableWrap tbody tr:nth-child(2n + 1) {
          background: #fff;
        }

        .tableWrap tbody tr:last-child {
          margin-bottom: 0;
          border-bottom: 0;
        }

        .tableWrap tbody td {
          display: table-cell;
          padding: 12px 14px !important;
          border: 0 !important;
          vertical-align: middle;
          white-space: normal;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        .tableWrap tbody td:nth-child(1) {
          padding-left: 18px !important;
          font-weight: 600;
          font-size: 14px;
          line-height: 1.35;
          color: rgba(15, 23, 42, 0.96);
        }

        .tableWrap tbody td:nth-child(2),
        .tableWrap tbody td:nth-child(3) {
          font-weight: 600;
          font-variant-numeric: tabular-nums;
          color: rgba(30, 41, 59, 0.95);
        }

        .tableWrap tbody td:nth-child(2)::before,
        .tableWrap tbody td:nth-child(3)::before {
          content: none !important;
          display: none !important;
        }
      }

      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
      }

      .hidden {
        display: none;
      }

      footer {
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        margin-top: 16px;
        padding-top: 12px;
      }

      .fnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 12px;
        font-weight: 800;
      }

      .fnav a {
        color: inherit;
        text-decoration: none;
        opacity: 0.85;
      }

      .fnav a:hover {
        opacity: 1;
      }

      .muted {
        opacity: 0.8;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .hdr {
          transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hdr.hdr--hidden {
          transform: translateY(-100%);
          pointer-events: none;
        }

        .wrap {
          padding: 12px;
        }

        .top {
          align-items: stretch;
        }

        .seg {
          width: 100%;
        }

        .seg button {
          flex: 1 1 0;
          text-align: center;
        }

        .btn {
          width: 100%;
          text-align: center;
        }

        /* Mobil: kart + grid (takım üstte, saat | kanal altta) */
        .tableWrap {
          overflow-x: visible;
          -webkit-overflow-scrolling: touch;
          padding: 0;
        }

        .tableWrap table {
          width: 100%;
          min-width: 0;
          display: block;
          border-collapse: separate;
          border-spacing: 0;
          font-size: 14px;
          line-height: 1.4;
          text-align: left;
        }

        .tableWrap thead {
          position: absolute;
          width: 1px;
          height: 1px;
          padding: 0;
          margin: -1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          clip-path: inset(50%);
          white-space: nowrap;
          border: 0;
        }

        .tableWrap tbody {
          display: block;
        }

        #currentTbody {
          padding: 10px;
        }

        .tableWrap tbody tr {
          display: grid;
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
          grid-template-rows: auto auto;
          gap: 10px 14px;
          padding: 14px 14px 14px 16px;
          margin-bottom: 12px;
          border-radius: 14px;
          border: 1px solid rgba(15, 23, 42, 0.08);
          background: #fff;
          box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }

        .tableWrap tbody tr:nth-child(2n) {
          background: #f9f9f9;
        }

        .tableWrap tbody tr:nth-child(2n + 1) {
          background: #fff;
        }

        .tableWrap tbody tr:last-child {
          margin-bottom: 0;
        }

        .tableWrap tbody tr:nth-child(odd) td,
        .tableWrap tbody tr:nth-child(even) td {
          background: transparent !important;
        }

        .tableWrap tbody td {
          display: block;
          padding: 0 !important;
          border: 0 !important;
          vertical-align: top;
          white-space: normal;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        .tableWrap tbody td:nth-child(1) {
          grid-column: 1 / -1;
          grid-row: 1;
          font-weight: 600;
          font-size: 14px;
          line-height: 1.38;
          color: rgba(15, 23, 42, 0.96);
        }

        .tableWrap tbody td:nth-child(2) {
          grid-column: 1;
          grid-row: 2;
          min-width: 0;
        }

        .tableWrap tbody td:nth-child(3) {
          grid-column: 2;
          grid-row: 2;
          min-width: 0;
        }

        .tableWrap tbody td:nth-child(2)::before,
        .tableWrap tbody td:nth-child(3)::before {
          display: block;
          font-size: 10px;
          font-weight: 800;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          margin-bottom: 5px;
          color: rgba(71, 85, 105, 0.88);
        }

        .tableWrap tbody td:nth-child(2)::before {
          content: "Saat";
        }

        .tableWrap tbody td:nth-child(3)::before {
          content: "Kanal";
        }

        .tableWrap tbody td:nth-child(2),
        .tableWrap tbody td:nth-child(3) {
          font-weight: 600;
          font-variant-numeric: tabular-nums;
          color: rgba(30, 41, 59, 0.95);
        }
      }
    </style>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Bugün Maç Var mı?",
        "url": "https://bugunmacvarmi.com/",
        "inLanguage": "tr-TR",
        "description": "Günün futbol ve basketbol maç programı; saat ve kanal bilgisi, yerel saat desteği.",
        "publisher": {
          "@type": "Organization",
          "name": "bugunmacvarmi.com",
          "url": "https://bugunmacvarmi.com/"
        }
      }
    </script>
  </head>
  <body>
    <header class="hdr">
      <div class="wrap hdrWrap">
        <div class="hdrCover">
          <div class="hdrCover__bg" aria-hidden="true"></div>
          <div class="hdrCover__row">
            <div class="hdrCover__text">
              <h1 class="hdrCover__title">Bugün Maç Var mı ?</h1>
              <p id="headerDate" class="hdrCover__date" aria-live="polite"></p>
              <p id="tzHeader" class="hdrCover__tz" aria-live="polite"></p>
            </div>
            <div class="hdrCover__actions">
              <div class="seg hdrSeg" role="tablist" aria-label="Spor seçimi">
                <button id="sportFootball" class="active" type="button" role="tab" aria-selected="true">Futbol</button>
                <button id="sportBasketball" type="button" role="tab" aria-selected="false">Basketbol</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">

      <div class="card">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Takımlar</th>
                <th scope="col">Saat</th>
                <th scope="col">Kanal</th>
              </tr>
            </thead>
            <tbody id="currentTbody"></tbody>
          </table>
        </div>
      </div>

      <button id="togglePast" class="btn" style="margin-top: 12px" type="button">Geçmiş Maçları Göster</button>

      <div id="pastBox" class="card hidden">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Takımlar</th>
                <th scope="col">Saat</th>
                <th scope="col">Kanal</th>
              </tr>
            </thead>
            <tbody id="pastTbody"></tbody>
          </table>
        </div>
      </div>

      <p id="tzInfo" class="meta"></p>
      <p id="err" class="meta hidden"></p>
      <footer>
        <div class="fnav">
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <a href="/" aria-current="page">Maçlar</a>
            <span style="opacity:.35">•</span>
            <a href="/politikalar.html">Politikalar</a>
          </div>
        </div>
        <div class="muted" style="margin-top:8px" id="lastUpdated"></div>
      </footer>
    </main>

    <script src="/js/matches.js" defer></script>
  </body>
</html>
