<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bugünkü maçları yerel saatinize göre listeler." />
    <title>Bugün Maç Var mı?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }

      body.dark {
        background: #020617;
        color: #e2e8f0;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 16px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 800;
        letter-spacing: -0.01em;
      }

      .btn {
        border: 1px solid rgba(148, 163, 184, 0.8);
        background: rgba(255, 255, 255, 0.9);
        color: inherit;
        padding: 8px 10px;
        border-radius: 10px;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
      }

      body.dark .btn {
        border-color: rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.7);
      }

      .hdr {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(241, 245, 249, 0.8);
        backdrop-filter: blur(8px);
      }

      body.dark .hdr {
        border-bottom-color: rgba(51, 65, 85, 0.55);
        background: rgba(2, 6, 23, 0.55);
      }

      .seg {
        display: inline-flex;
        border: 1px solid rgba(148, 163, 184, 0.7);
        border-radius: 999px;
        padding: 3px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      body.dark .seg {
        border-color: rgba(51, 65, 85, 0.9);
        background: rgba(15, 23, 42, 0.6);
      }

      .seg button {
        border: 0;
        background: transparent;
        padding: 8px 12px;
        font-weight: 800;
        font-size: 12px;
        color: inherit;
        cursor: pointer;
        border-radius: 999px;
        opacity: 0.88;
        transition: background 160ms ease, color 160ms ease, opacity 160ms ease, transform 160ms ease;
      }

      .seg button.active {
        background: #4f46e5;
        color: #fff;
        opacity: 1;
        box-shadow: 0 8px 18px rgba(79, 70, 229, 0.25);
      }

      body.dark .seg button.active {
        box-shadow: 0 10px 22px rgba(79, 70, 229, 0.25);
      }

      .sub {
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
        margin-top: 4px;
      }

      body.dark .sub {
        color: rgba(148, 163, 184, 1);
      }

      .card {
        margin-top: 12px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.9);
        overflow: hidden;
        box-shadow: 0 6px 14px rgba(2, 6, 23, 0.05);
      }

      body.dark .card {
        border-color: rgba(51, 65, 85, 0.6);
        background: rgba(15, 23, 42, 0.6);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 13px;
      }

      .tableWrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .tableWrap table {
        min-width: 640px;
      }

      thead {
        background: rgba(241, 245, 249, 0.9);
        color: rgba(15, 23, 42, 0.9);
      }

      body.dark thead {
        background: rgba(2, 6, 23, 0.35);
        color: rgba(226, 232, 240, 0.9);
      }

      th,
      td {
        padding: 10px 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        vertical-align: top;
      }

      body.dark th,
      body.dark td {
        border-top-color: rgba(51, 65, 85, 0.55);
      }

      tbody tr:nth-child(odd) td {
        background: rgba(241, 245, 249, 0.35);
      }

      body.dark tbody tr:nth-child(odd) td {
        background: rgba(2, 6, 23, 0.2);
      }

      .meta {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(71, 85, 105, 1);
      }

      body.dark .meta {
        color: rgba(148, 163, 184, 1);
      }

      .hidden {
        display: none;
      }

      footer {
        border-top: 1px solid rgba(148, 163, 184, 0.35);
        margin-top: 16px;
        padding-top: 12px;
      }

      body.dark footer {
        border-top-color: rgba(51, 65, 85, 0.55);
      }

      .fnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 12px;
        font-weight: 800;
      }

      .fnav a {
        color: inherit;
        text-decoration: none;
        opacity: 0.85;
      }

      .fnav a:hover {
        opacity: 1;
      }

      .muted {
        opacity: 0.8;
        font-size: 12px;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 12px;
        }

        .top {
          align-items: stretch;
        }

        .seg {
          width: 100%;
        }

        .seg button {
          flex: 1 1 0;
          text-align: center;
        }

        .btn {
          width: 100%;
          text-align: center;
        }

        th,
        td {
          padding: 9px 10px;
        }

        .tableWrap table {
          min-width: 560px;
        }
      }
    </style>
  </head>
  <body>
    <header class="hdr">
      <div class="wrap">
        <div class="top">
          <div>
            <h1>Bugün Maç Var mı?</h1>
            <div id="tzHeader" class="sub"></div>
          </div>
          <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end">
            <div class="seg" role="tablist" aria-label="Spor seçimi">
              <button id="sportFootball" class="active" type="button" role="tab" aria-selected="true">Futbol</button>
              <button id="sportBasketball" type="button" role="tab" aria-selected="false">Basketbol</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">

      <div class="card">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Takımlar</th>
                <th>Saat</th>
                <th>Kanal</th>
              </tr>
            </thead>
            <tbody id="currentTbody"></tbody>
          </table>
        </div>
      </div>

      <button id="togglePast" class="btn" style="margin-top: 12px" type="button">Geçmiş Maçları Göster</button>

      <div id="pastBox" class="card hidden">
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Takımlar</th>
                <th>Saat</th>
                <th>Kanal</th>
              </tr>
            </thead>
            <tbody id="pastTbody"></tbody>
          </table>
        </div>
      </div>

      <p id="tzInfo" class="meta"></p>
      <p id="err" class="meta hidden"></p>
      <footer>
        <div class="fnav">
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap">
            <a href="/" aria-current="page">Maçlar</a>
            <span style="opacity:.35">•</span>
            <a href="/politikalar.html">Politikalar</a>
          </div>
          <button id="themeBtn" class="btn" type="button">Koyu Mod</button>
        </div>
        <div class="muted" style="margin-top:8px" id="lastUpdated"></div>
      </footer>
    </main>

    <script>
      const SHEET_ID = "1BPzyNLclxAvhNg2t4puSyrA-VLGb_RuFqPmdr5PheBg";
      const GID_FOOTBALL = "0";
      const GID_BASKETBALL = "48872055";
      const PAST_THRESHOLD_MIN = 90;

      let currentGid = GID_FOOTBALL;

      function buildUrl(gid) {
        return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq&gid=${encodeURIComponent(gid)}`;
      }

      function extractGvizJson(text) {
        const start = text.indexOf("{");
        const end = text.lastIndexOf("}");
        if (start < 0 || end < 0 || end <= start) throw new Error("GViz JSON bulunamadı");
        return JSON.parse(text.slice(start, end + 1));
      }

      function fmtLocalTime(d) {
        return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function getTodayISO_TR() {
        return new Intl.DateTimeFormat("en-CA", {
          timeZone: "Europe/Istanbul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      }

      function parseTRTimeToDate(timeTR) {
        const parts = String(timeTR).trim().split(":");
        if (parts.length !== 2) return null;
        const h = Number(parts[0]);
        const m = Number(parts[1]);
        if (!Number.isFinite(h) || !Number.isFinite(m)) return null;
        if (h < 0 || h > 23 || m < 0 || m > 59) return null;

        const iso = `${getTodayISO_TR()}T${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:00+03:00`;
        const d = new Date(iso);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderRows(items, el) {
        el.innerHTML = items
          .map(
            (x) => `
              <tr>
                <td>${escapeHtml(x.teams)}</td>
                <td>${escapeHtml(x.timeLocal || x.timeTR)}</td>
                <td>${escapeHtml(x.channel)}</td>
              </tr>
            `,
          )
          .join("");
      }

      function setTimezoneInfo() {
        const offsetMinutes = new Date().getTimezoneOffset();
        const offsetHours = -offsetMinutes / 60;
        const off = offsetHours % 1 === 0 ? String(offsetHours) : offsetHours.toFixed(1).replace(/\.0$/, "");
        document.getElementById("tzInfo").textContent = `Maç saatleri yerel saatinize göre listelenir. (GMT${
          offsetHours >= 0 ? "+" : ""
        }${off})`;

        const hdr = document.getElementById("tzHeader");
        if (hdr) hdr.textContent = `Saatler yerel saatinize göre. (GMT${offsetHours >= 0 ? "+" : ""}${off})`;
      }

      function setLastUpdated(ts) {
        const d = new Date(ts);
        const str = d.toLocaleString([], { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });
        document.getElementById("lastUpdated").textContent = `Son güncelleme: ${str}`;
      }

      function showError(msg) {
        const el = document.getElementById("err");
        el.textContent = msg;
        el.classList.remove("hidden");
      }

      function clearError() {
        document.getElementById("err").classList.add("hidden");
        document.getElementById("err").textContent = "";
      }

      async function load() {
        clearError();
        const startedAt = Date.now();
        const res = await fetch(buildUrl(currentGid));
        if (!res.ok) throw new Error(`Veri alınamadı (HTTP ${res.status})`);
        const text = await res.text();
        const json = extractGvizJson(text);
        const rows = json?.table?.rows ?? [];

        const matches = rows
          .map((r) => {
            const c = r?.c ?? [];
            const timeTR = String(c?.[0]?.f ?? c?.[0]?.v ?? "").trim();
            const channel = String(c?.[1]?.v ?? "").trim();
            const teams = String(c?.[2]?.v ?? "").trim();
            if (!timeTR || timeTR.toLowerCase() === "saat") return null;

            const date = parseTRTimeToDate(timeTR);
            if (!date) return null;

            return { timeTR, channel, teams, date, timeLocal: fmtLocalTime(date) };
          })
          .filter(Boolean);

        const now = Date.now();
        const threshold = now - PAST_THRESHOLD_MIN * 60 * 1000;

        const current = [];
        const past = [];
        for (const m of matches) (m.date.getTime() > threshold ? current : past).push(m);

        current.sort((a, b) => a.date - b.date);
        past.sort((a, b) => a.date - b.date);

        renderRows(current, document.getElementById("currentTbody"));
        renderRows(past, document.getElementById("pastTbody"));
        setTimezoneInfo();
        setLastUpdated(startedAt);
      }

      document.getElementById("togglePast").addEventListener("click", () => {
        const box = document.getElementById("pastBox");
        box.classList.toggle("hidden");
        document.getElementById("togglePast").textContent = box.classList.contains("hidden")
          ? "Geçmiş Maçları Göster"
          : "Geçmiş Maçları Gizle";
      });

      function setSportButtons(active) {
        const f = document.getElementById("sportFootball");
        const b = document.getElementById("sportBasketball");
        const isFootball = active === "football";
        f.classList.toggle("active", isFootball);
        b.classList.toggle("active", !isFootball);
        f.setAttribute("aria-selected", isFootball ? "true" : "false");
        b.setAttribute("aria-selected", !isFootball ? "true" : "false");
      }

      document.getElementById("sportFootball").addEventListener("click", () => {
        currentGid = GID_FOOTBALL;
        setSportButtons("football");
        load().catch((err) => showError(err?.message || "Bir hata oluştu"));
      });

      document.getElementById("sportBasketball").addEventListener("click", () => {
        currentGid = GID_BASKETBALL;
        setSportButtons("basketball");
        load().catch((err) => showError(err?.message || "Bir hata oluştu"));
      });

      // Theme toggle (stored)
      const THEME_KEY = "bmv:home-theme:v1";
      const themeBtn = document.getElementById("themeBtn");
      let dark = false;

      function applyTheme() {
        document.body.classList.toggle("dark", dark);
        themeBtn.textContent = dark ? "Açık Mod" : "Koyu Mod";
        try {
          localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
        } catch {}
      }

      try {
        const saved = localStorage.getItem(THEME_KEY);
        dark = saved === "dark";
      } catch {}
      applyTheme();

      themeBtn.addEventListener("click", () => {
        dark = !dark;
        applyTheme();
      });

      load().catch((err) => {
        console.error(err);
        showError(err?.message || "Bir hata oluştu");
      });
    </script>
  </body>
</html>
